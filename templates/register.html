{% extends "base.html" %}

{% block title %}تسجيل جديد - GOLD PRO{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h2>✍️ إنشاء حساب جديد</h2>
        <p class="auth-subtitle">أدخل بياناتك لإنشاء حسابك الأول.</p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" class="auth-form" autocomplete="off">
            <div class="form-group">
                <label for="full_name">الاسم الكامل</label>
                <input type="text" id="full_name" name="full_name" value="{{ (form_data or {}).get('full_name', '') }}" required>
            </div>

            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" name="username" value="{{ (form_data or {}).get('username', '') }}" required>
            </div>

            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" value="{{ (form_data or {}).get('email', '') }}" required>
            </div>

            <div class="form-group">
                <label for="phone">رقم الهاتف أو واتساب (اختياري)</label>
                <input type="text" id="phone" name="phone" value="{{ (form_data or {}).get('phone', '') }}" placeholder="مثال: 009627XXXXXXXX">
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">تأكيد كلمة المرور</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>

            <label class="terms-row">
                <input type="checkbox" name="marketing_email_opt_in" value="1" {% if (form_data or {}).get('marketing_email_opt_in', True) %}checked{% endif %}>
                <span>أوافق على استقبال تحديثات الموقع والعروض عبر البريد الإلكتروني</span>
            </label>

            <label class="terms-row">
                <input type="checkbox" name="whatsapp_opt_in" value="1" {% if (form_data or {}).get('whatsapp_opt_in', False) %}checked{% endif %}>
                <span>أوافق على استخدام رقم الهاتف للتواصل عبر واتساب عند الحاجة</span>
            </label>

            <label class="terms-row">
                <input type="checkbox" name="terms" value="1" required>
                <span>أوافق على الشروط والأحكام</span>
            </label>

            <button type="submit" class="btn-submit">إنشاء الحساب</button>
        </form>

        <div class="auth-links">
            لديك حساب بالفعل؟ <a href="/login?first=1">تسجيل الدخول</a>
        </div>
        <div class="auth-links">
            لم يصلك بريد التفعيل؟ <a href="/resend-activation">إعادة إرسال الرابط</a>
        </div>
    </div>
</div>

<style>
.auth-wrap {
    min-height: calc(100vh - 210px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
}

.auth-card {
    width: 100%;
    max-width: 520px;
    background: #fff;
    border-radius: 16px;
    border: 1px solid #f0e1b8;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 2rem;
}

.auth-card h2 {
    color: #b68a13;
    margin-bottom: 0.4rem;
    font-weight: 800;
}

.auth-subtitle {
    color: #6b7280;
    margin-bottom: 1.2rem;
}

.auth-form { display: grid; gap: 0.9rem; }

.form-group { display: grid; gap: 0.35rem; }

.form-group label { font-weight: 600; color: #374151; }

.form-group input {
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 0.65rem 0.75rem;
}

.form-group input:focus {
    outline: none;
    border-color: #d4a72f;
    box-shadow: 0 0 0 3px rgba(212, 167, 47, 0.16);
}

.terms-row {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    color: #4b5563;
    font-size: 0.95rem;
}

.btn-submit {
    border: none;
    border-radius: 10px;
    padding: 0.8rem;
    font-size: 1rem;
    font-weight: 700;
    background: linear-gradient(135deg, #d4a72f 0%, #b68a13 100%);
    color: #1f2937;
}

.auth-links {
    margin-top: 1rem;
    text-align: center;
    color: #6b7280;
}

.auth-links a {
    color: #8e6c0d;
    text-decoration: none;
    font-weight: 700;
}
</style>
{% endblock %}
