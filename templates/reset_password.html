{% extends "base.html" %}
{% block title %}إعادة تعيين كلمة المرور{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 220px);">
  <div class="col-md-6">
    <div class="card card-soft p-4" style="border: 1px solid #f0e1b8; border-radius:16px; box-shadow:0 10px 30px rgba(15,23,42,0.08);">
      <h3 class="mb-2">إعادة تعيين كلمة المرور</h3>

      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}

      {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        <a class="btn btn-outline-primary mt-3 w-100" href="/login?first=1">العودة لتسجيل الدخول</a>
      {% else %}
        <form method="POST">
          <label class="form-label" for="password">كلمة المرور الجديدة</label>
          <input class="form-control" id="password" type="password" name="password" required title="كلمة المرور الجديدة" placeholder="أدخل كلمة المرور الجديدة" aria-label="كلمة المرور الجديدة" />
          <label class="form-label mt-3" for="confirm_password">تأكيد كلمة المرور</label>
          <input class="form-control" id="confirm_password" type="password" name="confirm_password" required title="تأكيد كلمة المرور" placeholder="أعد إدخال كلمة المرور" aria-label="تأكيد كلمة المرور" />
          <button class="btn btn-primary mt-3 w-100" type="submit">حفظ</button>
        </form>
      {% endif %}
    </div>
  </div>
</div>

<style>
h3 {
  color: #b68a13;
  font-weight: 800;
}

.form-control:focus {
  border-color: #d4a72f;
  box-shadow: 0 0 0 3px rgba(212, 167, 47, 0.16);
}
</style>
{% endblock %}
