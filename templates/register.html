{% extends "base.html" %}
{% block content %}

<div class="auth-container" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#f8fafc 0%,#e0e7ff 100%);">
    <div class="auth-card" style="max-width:420px; width:100%; background:white; border-radius:22px; padding:2.7rem 2.2rem 2.2rem 2.2rem; box-shadow:0 10px 40px rgba(102,126,234,0.13); margin:2rem auto;">
        <h2 style="color:#5a67d8; margin-bottom:0.7rem; font-size:2.1rem; font-weight:800; letter-spacing:1px; text-align:center;">تسجيل مستخدم جديد</h2>
        <p class="auth-subtitle" style="color:#888; margin-bottom:1.7rem; font-size:1.05rem; text-align:center;">يرجى تعبئة البيانات بدقة. سيتم إنشاء الحساب مباشرة إذا لم يتم إعداد SMTP.</p>
        {% if error %}
        <div class="alert alert-danger" style="margin-bottom:1.2rem;">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success" style="margin-bottom:1.2rem;">{{ success }}</div>
        {% endif %}
        <form method="POST" class="auth-form" autocomplete="off" style="display:flex; flex-direction:column; gap:1.1rem;">
            <div class="form-group">
                <label for="first_name">الاسم الأول</label>
                <input type="text" id="first_name" name="first_name" placeholder="الاسم الأول" required>
                <span class="form-icon">👤</span>
            </div>
            <div class="form-group">
                <label for="last_name">الاسم الأخير</label>
                <input type="text" id="last_name" name="last_name" placeholder="الاسم الأخير" required>
                <span class="form-icon">👤</span>
            </div>
            <div class="form-group">
                <label for="nickname">النك نيم (اختياري)</label>
                <input type="text" id="nickname" name="nickname" placeholder="النك نيم (اختياري)">
                <span class="form-icon">🆔</span>
            </div>
            <div class="form-group">
                <label for="phone">رقم الهاتف</label>
                <input type="tel" id="phone" name="phone" placeholder="رقم الهاتف" required>
                <span class="form-icon">📱</span>
            </div>
            <div class="form-group">
                <label for="country">الدولة</label>
                <select id="country" name="country" required>
                    {% for country in countries %}
                        <option value="{{ country }}">{{ country }}</option>
                    {% endfor %}
                </select>
                <span class="form-icon">🌍</span>
            </div>
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" placeholder="البريد الإلكتروني" required>
                <span class="form-icon">✉️</span>
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" placeholder="كلمة المرور" required>
                <span class="form-icon">🔒</span>
            </div>
            <button type="submit" class="btn-submit" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; border:none; border-radius:8px; font-size:1.1rem; font-weight:700; cursor:pointer; transition:all 0.3s ease; display:flex; align-items:center; justify-content:center; gap:0.5rem; margin-top:0.5rem; box-shadow:0 4px 16px rgba(102,126,234,0.09);">
                <span style="font-size:1.2rem;">تسجيل جديد</span> <span style="font-size:1.3rem;">+</span>
            </button>
        </form>
        <div style="text-align:center; margin-top:2.2rem;">
            <a href="/" class="btn-submit" style="background:linear-gradient(135deg,#a0aec0 0%,#667eea 100%); color:white; border:none; border-radius:8px; font-size:1.05rem; font-weight:600; text-decoration:none; display:inline-block; padding:0.8rem 2.5rem; box-shadow:0 2px 10px rgba(102,126,234,0.08); transition:all 0.2s;">العودة للصفحة الرئيسية</a>
        </div>
    </div>
</div>
<style>
/* ...existing CSS styles... */
@media (max-width: 768px) {
    .auth-container {
        padding: 0.5rem;
        min-height: 100vh;
    }
    .auth-card {
        padding: 1.2rem;
    }
}
</style>
{% endblock %}
