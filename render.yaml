services:
  - type: web
    name: goldprofx
    env: python
    plan: free
    healthCheckPath: /healthz
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT"
    disks:
      - name: goldpro-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/goldpro_system.db
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: APP_DEBUG
        value: "0"
      - key: DELIVERY_REPORT_DAILY_TIME
        value: "23:55"
      - key: DELIVERY_REPORT_CHECK_INTERVAL_SECONDS
        value: "30"
      - key: LIVE_PRICE_CACHE_TTL_SECONDS
        value: "6"
      - key: LIVE_PRICE_FAIL_CACHE_TTL_SECONDS
        value: "4"
      - key: PUBLIC_BASE_URL
        value: "https://goldprofx.onrender.com"
      - key: SMTP_ENABLED
        value: "1"
      - key: SMTP_SERVER
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_TIMEOUT_SECONDS
        value: "20"
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MM_TELEGRAM_BOT_TOKEN
        sync: false
      - key: MM_TELEGRAM_CHAT_ID
        sync: false
