services:
  - type: web
    name: goldprofx
    env: python
    plan: free
    healthCheckPath: /healthz
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT"
    disks:
      - name: goldpro-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/goldpro_system.db
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: APP_DEBUG
        value: "0"
      - key: DELIVERY_REPORT_DAILY_TIME
        value: "23:55"
      - key: DELIVERY_REPORT_CHECK_INTERVAL_SECONDS
        value: "30"
      - key: LIVE_PRICE_CACHE_TTL_SECONDS
        value: "6"
      - key: LIVE_PRICE_FAIL_CACHE_TTL_SECONDS
        value: "4"
      - key: MM_TELEGRAM_BOT_TOKEN
        sync: false
      - key: MM_TELEGRAM_CHAT_ID
        sync: false
